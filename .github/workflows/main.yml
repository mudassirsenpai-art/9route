name: OmniRoute Workflow Setup

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-omniroute:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 1. Install OmniRoute Globally
    - name: Install OmniRoute
      run: npm install -g omniroute

    # 2. Start OmniRoute in background
    - name: Start OmniRoute Server
      run: |
        nohup omniroute > router.log 2>&1 &
        echo "OmniRoute started in background."
        
    # 3. Wait for localhost to be ready (Port changed to 20120)
    - name: Verify Server is Live
      run: |
        echo "Waiting for 127.0.0.1:20120..."
        npx wait-on http://127.0.0.1:20120/v1 -t 60000
        echo "Server is UP!"

    # 4. Install Cloudflare & Expose Server
    - name: Expose Server via Cloudflare Tunnel & Keep Alive
      run: |
        echo "Installing Cloudflare Tunnel..."
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
        echo "Starting Cloudflare Tunnel..."
        # IPv4 (127.0.0.1) aur Port 20120 use kda rahe hain taaki 502 error na aaye
        nohup cloudflared tunnel --url http://127.0.0.1:20120 > cloudflared.log 2>&1 &
        
        # URL generate hone ke liye 10 seconds wait kdo
        sleep 10
        
        echo "=========================================="
        echo "🚀 APNA DASHBOARD YAHAN OPEN KDO:"
        # OmniRoute ka dashboard root par hai, isliye /dashboard hatwa diya hai
        grep -o 'https://[-0-9a-zA-Z]*\.trycloudflare\.com' cloudflared.log
        echo "=========================================="
        
        # 5. Keep workflow alive for 6 hours
        echo "Keeping workflow alive for 6 hours..."
        sleep 21600
