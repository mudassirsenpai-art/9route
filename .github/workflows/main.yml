name: 9Router Workflow Setup

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-9router:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install 9Router Globally
      run: npm install -g 9router

    - name: Start 9Router Server
      run: |
        nohup 9router > router.log 2>&1 &
        echo "9Router started in background."
        
    - name: Verify Server is Live
      run: |
        echo "Waiting for localhost:20128..."
        npx wait-on http://localhost:20128/v1 -t 60000
        echo "Server is UP!"

    # NAYA STEP: Yeh port 20128 ko internet par public karega
    - name: Expose Server to Internet & Keep Alive
      run: |
        echo "Starting Localtunnel..."
        # Localtunnel ko background me chalayein aur public URL generate karein
        nohup npx localtunnel --port 20128 > public_url.txt 2>&1 &
        
        # URL generate hone ka wait karein
        sleep 5 
        
        echo "=========================================="
        echo "🚀 APNA DASHBOARD YAHAN OPEN KAREIN:"
        cat public_url.txt
        echo "=========================================="
        
        echo "Keeping workflow alive for 6 hours..."
        sleep 21600
