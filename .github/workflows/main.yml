name: 9Router Workflow Setup

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-9router:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 1. Install 9Router
    - name: Install 9Router Globally
      run: npm install -g 9router

    # 2. Start 9Router in background
    - name: Start 9Router Server
      run: |
        nohup 9router > router.log 2>&1 &
        echo "9Router started in background."
        
    # 3. Wait for localhost to be ready
    - name: Verify Server is Live
      run: |
        echo "Waiting for localhost:20128..."
        npx wait-on http://localhost:20128/v1 -t 60000
        echo "Server is UP!"

    # 4. Install Cloudflare & Expose Server
    - name: Expose Server via Cloudflare Tunnel & Keep Alive
      run: |
        echo "Installing Cloudflare Tunnel..."
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb
        
        echo "Starting Cloudflare Tunnel..."
        nohup cloudflared tunnel --url http://localhost:20128 > cloudflared.log 2>&1 &
        
        # URL generate hone ke liye 10 seconds wait kda
        sleep 10
        
        echo "=========================================="
        echo "🚀 APNA DASHBOARD YAHAN OPEN KDO:"
        # Yeh line URL nikal kar uske aage automatically /dashboard laga degi
        grep -o 'https://[-0-9a-zA-Z]*\.trycloudflare\.com' cloudflared.log | awk '{print $1"/dashboard"}'
        echo "=========================================="
        
        # 5. Keep workflow alive for 6 hours
        echo "Keeping workflow alive for 6 hours..."
        sleep 21600
